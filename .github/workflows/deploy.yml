name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # The "Run workflow" button in the Actions tab

env:
  DOTNET_VERSION: '8.0.x'

# Required for OIDC: GitHub only mints the federated token if the
# workflow explicitly requests permission. Without id-token: write,
# the azure/login step fails with an opaque error.
permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  deploy:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    needs: ci                                     # Won't start unless CI passed
    if: github.event_name == 'workflow_dispatch'  # Manual trigger only
    environment: production                       # Lets us require approval later
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Tailwind CSS — the project's MSBuild target only runs on Windows
      # (it looks for .tailwind\tailwindcss.exe). On the Ubuntu runner we
      # download the Linux standalone binary and produce app.built.css
      # ourselves before dotnet publish picks up wwwroot.
      - name: Build Tailwind CSS
        run: |
          curl -sSL -o tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v4.2.1/tailwindcss-linux-x64
          chmod +x tailwindcss
          ./tailwindcss \
            -i src/Signavex.Web/Styles/app.css \
            -o src/Signavex.Web/wwwroot/css/app.built.css \
            --minify

      - name: Publish Signavex.Web
        run: dotnet publish src/Signavex.Web -c Release -o ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: signavex-web
          package: ./publish
