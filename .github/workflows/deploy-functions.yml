name: CI / Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/Signavex.Functions/**'
      - 'src/Signavex.Domain/**'
      - 'src/Signavex.Engine/**'
      - 'src/Signavex.Signals/**'
      - 'src/Signavex.Infrastructure/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:        # Manual trigger from the Actions tab

env:
  DOTNET_VERSION: '8.0.x'
  FUNCTIONS_PROJECT: 'src/Signavex.Functions'
  FUNCTION_APP_NAME: 'signavex-functions'

# Required for OIDC — GitHub mints the federated token only when the
# workflow explicitly requests it.
permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  deploy:
    name: Deploy Functions to Azure
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Signavex.Functions
        run: |
          dotnet publish ${{ env.FUNCTIONS_PROJECT }} \
            -c Release \
            -o ./publish
          # Functions deploy expects a specific output structure — zip from
          # the publish dir itself, not a parent.
          cd ./publish
          zip -r ../functions-app.zip .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./functions-app.zip
